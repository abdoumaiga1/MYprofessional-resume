name: Build And Push to ECR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Code
        uses: actions/checkout@v4

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Build Docker Image
        run: |
          docker build -t 288761730265.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest .

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 288761730265.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Image to ECR
        run: |
          docker push 288761730265.dkr.ecr.us-east-1.amazonaws.com/my-repo:latest